name: Genera EPG

on:
  schedule:
    - cron: "0 4 * * *"   # ogni giorno alle 04:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Clona repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐍 Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 📦 Installa dipendenze
      - name: Installa dipendenze
        run: pip install requests

      # ▶️ Esegui script
      - name: Genera EPG
        run: python genera_epg.py

      # 💾 Commit solo se ci sono modifiche
      - name: Commit e push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add 04.epg traduzioni.json

          git diff --cached --quiet || git commit -m "Aggiornamento automatico EPG"

          git push
