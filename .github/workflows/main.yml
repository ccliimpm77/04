name: Update Italian EPG

on:
  schedule:
    - cron: '15 1 * * *'
  workflow_dispatch:

# AGGIUNTO: Permessi necessari per scrivere nel repository
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests lxml deep-translator

    - name: Run EPG Script
      run: python update_epg.py

    - name: Commit and Push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add 04.epg
        # Il commit non fallisce se non ci sono cambiamenti
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update EPG $(date +'%Y-%m-%d %H:%M')" && git push)
