name: Update Italian EPG

on:
  schedule:
    - cron: '15 1 * * *'
  workflow_dispatch:

# AGGIUNTO: Permessi necessari per scrivere nel repository
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests lxml deep-translator

    - name: Run EPG Script
      run: python update_epg.py

- name: Commit and Push
      run: |
        # Configura l'utente bot
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Verifica se il file è stato creato, altrimenti esce con errore utile
        if [ ! -f "04.epg" ]; then
          echo "Errore: Il file 04.epg non è stato generato dallo script Python!"
          exit 1
        fi

        # Aggiunge il file
        git add 04.epg
        
        # Controlla se ci sono modifiche effettive da caricare
        if git diff --quiet && git diff --staged --quiet; then
          echo "Nessuna modifica rilevata nell'EPG. Salto il commit."
        else
          git commit -m "Update EPG $(date +'%Y-%m-%d %H:%M')"
          # Forza il push usando il token GITHUB_TOKEN per l'autenticazione
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
        fi
