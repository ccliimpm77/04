name: Update Italian EPG

on:
  schedule:
    # Esegue ogni mattina alle 01:15 UTC (02:15 in Italia con ora solare)
    - cron: '15 1 * * *'
  workflow_dispatch: # Permette l'avvio manuale dal tab "Actions"

# Questo blocco è FONDAMENTALE per risolvere l'errore 128
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Scarica il codice del tuo repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Installa Python (versione aggiornata)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Velocizza le esecuzioni future

      # 3. Installa le librerie necessarie
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests lxml deep-translator

      # 4. Esegue lo script che crea il file 04.epg
      - name: Run EPG Script
        run: python update_epg.py

      # 5. Salva il file nel repository (Fix Errore 128)
      - name: Commit and Push
        run: |
          # Configura l'identità del bot
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Verifica se il file 04.epg esiste effettivamente
          if [ -f "04.epg" ]; then
            git add 04.epg
            
            # Controlla se ci sono cambiamenti rispetto alla versione precedente
            if git diff --quiet && git diff --staged --quiet; then
              echo "Nessuna modifica rilevata nel file EPG. Salto il commit."
            else
              git commit -m "Aggiornamento automatico EPG: $(date +'%Y-%m-%d %H:%M')"
              
              # Push forzato usando il token nell'URL per bypassare blocchi di permessi
              git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
              echo "File 04.epg caricato con successo."
            fi
          else
            echo "ERRORE: Lo script Python non ha generato il file 04.epg. Controlla i log dello step precedente."
            exit 1
          fi
